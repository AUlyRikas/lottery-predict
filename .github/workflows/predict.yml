name: 彩票预测自动更新

on:
  schedule:
    - cron: '0 1,13 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: 安装依赖
      run: pip install requests
    
    - name: 运行预测
      run: python combine_predict.py
    
    - name: 提交更改
      run: |
        git config user.name "机器人"
        git config user.email "bot@example.com"
        git add .
        git diff --staged --quiet || git commit -m "自动更新"
        git push
